<!DOCTYPE html>
<html>
<head>
  <title>Ultimate Deals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family: Arial; background:#f1f3f6; }

    /* Header */
    .header {
      background:#2874f0;
      padding:10px;
      display:flex;
      align-items:center;
      color:white;
    }
    .logo { font-size:20px; font-weight:bold; }
    .search {
      margin-left:20px;
      flex:1;
    }
    .search input {
      width:100%;
      padding:8px;
      border:none;
      border-radius:4px;
    }

    /* Categories */
    .categories {
      display:flex;
      overflow:auto;
      background:white;
      padding:10px;
    }
    .cat {
      margin-right:15px;
      font-size:14px;
      white-space:nowrap;
    }

    /* Products */
    .products {
      display:grid;
      grid-template-columns: repeat(2,1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      background:white;
      padding:10px;
      border-radius:8px;
      text-align:center;
    }

    .card img {
      width:100%;
      height:120px;
      object-fit:contain;
    }

    .price { color:green; font-weight:bold; }

    .btn {
      display:block;
      margin-top:8px;
      background:#fb641b;
      color:white;
      padding:8px;
      text-decoration:none;
      border-radius:4px;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="logo">UltimateDeals</div>
  <div class="search">
    <input type="text" placeholder="Search products...">
  </div>
</div>

<div class="categories">
  <div class="cat">Mobiles</div>
  <div class="cat">Electronics</div>
  <div class="cat">Gaming</div>
  <div class="cat">Fashion</div>
</div>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <p>Gaming Phone</p>
    <div class="price">₹12,999</div>
    <a href="#" class="btn">Buy Now</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <p>Wireless Earbuds</p>
    <div class="price">₹1,499</div>
    <a href="#" class="btn">Buy Now</a>
  </div>

</div>

</body>
</html>
