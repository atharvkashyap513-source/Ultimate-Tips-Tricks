<!DOCTYPE html>
<html>
<head>
<title>Ultimate Playz</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

/* Header */
header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    color: cyan;
    text-shadow: 0 0 10px cyan;
}

/* Navbar */
nav {
    display: flex;
    justify-content: center;
    background: #111;
}
nav a {
    padding: 12px 20px;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}
nav a:hover {
    background: cyan;
    color: black;
}

/* Section */
section {
    padding: 20px;
}

/* Box */
.box {
    background: #111;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    box-shadow: 0 0 10px cyan;
    transition: 0.3s;
}
.box:hover {
    transform: scale(1.05);
}

/* Button */
.btn {
    background: cyan;
    padding: 10px 15px;
    color: black;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
.btn:hover {
    background: white;
}

/* Video */
iframe {
    width: 100%;
    height: 200px;
    border-radius: 10px;
}
</style>

</head>

<body>

<header>🔥 Ultimate Playz 🎮</header>

<nav>
<a href="#">Home</a>
<a href="#">Tips</a>
<a href="#">Videos</a>
<a href="#">Contact</a>
</nav>

<section>

<h2>Welcome Gamer 😎</h2>
<div class="box">
<p>Welcome to Ultimate Playz - Best Gaming Tips & Tricks 🚀</p>
<button class="btn">Subscribe Now</button>
</div>

<h2>🔥 Gaming Tips</h2>
<div class="box">
<p>👉 Best PvP Tricks<br>
👉 Pro Sensitivity Settings<br>
👉 Win Every Match Tips</p>
</div>

<h2>🎥 Latest Video</h2>
<div class="box">
<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</div>

<h2>📩 Contact</h2>
<div class="box">
<p>Follow me on YouTube & Instagram 🔥</p>
</div>

</section>

</body>
</html>
